name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the problem.
      placeholder: |
        1. Install @pyyupsk/nit
        2. Add config to package.json
        3. Run `nit install`
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "@pyyupsk/nit Version"
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime & Version
      placeholder: "Bun 1.3.11 / Node.js 22.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.0 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
