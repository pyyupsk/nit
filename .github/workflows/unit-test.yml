name: Unit Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  unit-test:
    uses: sxzz/workflows/.github/workflows/unit-test.yml@v1
    with:
      typecheck: bun run typecheck
      lint: bun run check
      build: bun run build
      test: bun run test
      os-matrix: '"ubuntu-latest"'
      node-versions: '22'
